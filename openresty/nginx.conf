lua_shared_dict backend_state 1m;
lua_shared_dict request_counts 1m;
lua_shared_dict request_timestamps 1m;
lua_shared_dict coord_lock 1m;

user root;

resolver 127.0.0.11 ipv6=off;

server {
    listen 11434;

    location / {
        set $ollama_upstream "http://ollama:11434";
        access_by_lua_file  /etc/nginx/lua/coordinator.lua;

        proxy_pass          $ollama_upstream;
        proxy_http_version  1.1;
        proxy_buffering     off;
        proxy_set_header    Host $host;
        proxy_set_header    Connection '';
        proxy_read_timeout  600s;
        proxy_send_timeout  600s;
    }

    log_by_lua_block {
        if ngx.ctx.counted then
            local counts = ngx.shared.request_counts
            if (counts:get("ollama") or 0) > 0 then
                counts:incr("ollama", -1, 0)
            end
        end
    }
}

server {
    listen 8080;

    location / {
        set $llamacpp_upstream "http://llama-cpp:8080";
        access_by_lua_file  /etc/nginx/lua/coordinator.lua;

        proxy_pass          $llamacpp_upstream;
        proxy_http_version  1.1;
        proxy_buffering     off;
        proxy_set_header    Host $host;
        proxy_set_header    Connection '';
        proxy_read_timeout  600s;
        proxy_send_timeout  600s;
    }

    log_by_lua_block {
        if ngx.ctx.counted then
            local counts = ngx.shared.request_counts
            if (counts:get("llama_cpp") or 0) > 0 then
                counts:incr("llama_cpp", -1, 0)
            end
        end
    }
}
