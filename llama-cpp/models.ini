; ─────────────────────────────────────────────────────────────
; GPT-OSS 20B (MoE) — unsloth UD-Q4_K_XL
; MoE: backbone on GPU, experts on CPU
; Native ctx = 131072
; reasoning_effort: low / medium / high via chat-template-kwargs
; OpenAI recommended: temp=1.0 top-p=1.0 top-k=0
; ─────────────────────────────────────────────────────────────

[gpt-oss-20b-low-64k]
hf                   = unsloth/gpt-oss-20b-GGUF:UD-Q4_K_XL
temp                 = 1.0
top-p                = 1.0
top-k                = 0
min-p                = 0.00
repeat-penalty       = 1.0
ctx-size             = 65536
reasoning-format     = auto
