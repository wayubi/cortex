[*]
ngl              = -1
flash-attn       = true
jinja            = true
no-mmap          = true
no-mmproj        = true
mlock            = true
parallel         = 1
cont-batching    = true
threads          = 20
threads-batch    = 20
ctx-size         = 65536
batch-size       = 4096
ubatch-size      = 1024
cache-type-k     = q4_0
cache-type-v     = q4_0

; ─────────────────────────────────────────────────────────────
; Hy-MT2-7B — tencent Q4_K_M
; 7B dense model, fully on GPU, optimized for translation
; Native ctx = 262144
; ─────────────────────────────────────────────────────────────
[hy-mt2-7b]
hf               = tencent/Hy-MT2-7B-GGUF:Q4_K_M
temp             = 0.7
top-p            = 0.6
top-k            = 20
repeat-penalty   = 1.05

; ─────────────────────────────────────────────────────────────
; ZamAI-Llama3-Pashto — Llama 3-based Pashto language model
; ~8B dense model, fully on GPU
; ─────────────────────────────────────────────────────────────
[zamai-llama3-pashto]
hf               = mradermacher/ZamAI-LIama3-Pashto-GGUF:Q4_K_M

