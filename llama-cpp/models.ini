[*]
ngl              = -1
flash-attn       = true
jinja            = true
no-mmap          = true
no-mmproj        = true
mlock            = true
parallel         = 1
cont-batching    = true
threads          = 20
threads-batch    = 20
ctx-size         = 65536
batch-size       = 512
ubatch-size      = 256
cache-type-k     = q4_0
cache-type-v     = q4_0

; ─────────────────────────────────────────────────────────────
; Hy-MT2-7B — tencent Q4_K_M
; 7B dense model, fully on GPU, optimized for translation
; Native ctx = 262144
; ─────────────────────────────────────────────────────────────
[hy-mt2-7b]
hf               = tencent/Hy-MT2-7B-GGUF:Q4_K_M
temp             = 0.7
top-p            = 0.6
top-k            = 20
repeat-penalty   = 1.05

; ─────────────────────────────────────────────────────────────
; ZamAI-Llama3-Pashto — Llama 3-based Pashto language model
; ~8B dense model, fully on GPU
; ─────────────────────────────────────────────────────────────
[zamai-llama3-pashto]
hf               = mradermacher/ZamAI-LIama3-Pashto-GGUF:Q4_K_M

; ─────────────────────────────────────────────────────────────
; GLM-4.7-Flash 30B-A3B (MoE) — unsloth UD-Q4_K_XL
; MoE: backbone on GPU (~3-4GB), experts on CPU (~18GB RAM)
; Native ctx = 202752
; ─────────────────────────────────────────────────────────────
[glm-4.7-flash]
hf               = unsloth/GLM-4.7-Flash-GGUF:UD-Q4_K_XL

; ─────────────────────────────────────────────────────────────
; GLM-4.7-Flash-REAP 23B-A3B (MoE) — unsloth UD-Q4_K_XL
; MoE: backbone on GPU (~3-4GB), experts on CPU (~18GB RAM)
; Native ctx = 202752
; ─────────────────────────────────────────────────────────────
[glm-4.7-flash-reap]
hf               = unsloth/GLM-4.7-Flash-REAP-23B-A3B-GGUF:UD-Q4_K_XL

; ─────────────────────────────────────────────────────────────
; GPT-OSS 20B (MoE) — unsloth UD-Q4_K_XL
; MoE: backbone on GPU (~3-4GB), experts on CPU
; Native ctx = 262144
; ─────────────────────────────────────────────────────────────
[gpt-oss-20b]
hf               = unsloth/gpt-oss-20b-GGUF:UD-Q4_K_XL

; ─────────────────────────────────────────────────────────────
; Qwen3.5-9B MTP — unsloth UD-Q4_K_XL
; Dense model, fully on GPU, MTP speculative decoding
; Native ctx = 262144
; ─────────────────────────────────────────────────────────────
[qwen3.5-9b-mtp]
hf               = unsloth/Qwen3.5-9B-MTP-GGUF:UD-Q4_K_XL
temp             = 0.6
top-p            = 0.95
top-k            = 20
min-p            = 0.00
presence-penalty = 0.0
repeat-penalty   = 1.0
spec-type        = draft-mtp
spec-draft-n-max = 2
spec-draft-p-min = 0.7
ctx-size         = 131072

; ─────────────────────────────────────────────────────────────
; Qwen3.6-35B-A3B MTP (MoE hybrid: attention + SSM) — unsloth UD-Q4_K_XL
; Native ctx = 262144; SSM layers: only 10 attn layers have KV — 262K costs ~720MB KV
; ─────────────────────────────────────────────────────────────
[qwen3.6-35b-mtp]
hf               = unsloth/Qwen3.6-35B-A3B-MTP-GGUF:UD-Q4_K_XL
temp             = 0.6
top-p            = 0.95
top-k            = 20
min-p            = 0.00
presence-penalty = 0.0
repeat-penalty   = 1.0
spec-type        = draft-mtp
spec-draft-n-max = 2
spec-draft-p-min = 0.7
ctx-size         = 131072
