services:

  llama-build:
    # docker compose --profile build build llama-build
    profiles: ["build"]
    build:
      context: ./llama-cpp
      dockerfile: Dockerfile
      args:
        BUILD_JOBS: "20"
    image: llama-cpp:latest

  llama-cpp:
    runtime: nvidia
    restart: unless-stopped
    image: llama-cpp:latest
    networks:
      - cortex_network
    volumes:
      - llama-cpp_data:/root/.cache/huggingface
      - ./llama-cpp/models.ini:/models.ini
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    ulimits:
      memlock:
        soft: -1
        hard: -1
    command:
      - "--models-preset"
      - "/models.ini"
      - "--port"
      - "8080"
      - "--host"
      - "0.0.0.0"

  ollama:
    image: ollama/ollama
    restart: unless-stopped
    runtime: nvidia
    healthcheck:
      test: ollama --version || exit 1
    networks:
      - cortex_network
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_MAX_LOADED_MODELS=1

  openresty:
    build:
      context: ./openresty
      dockerfile: Dockerfile
    user: root
    restart: unless-stopped
    ports:
      - "11434:11434"
      - "8080:8080"
    volumes:
      - ./openresty/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./openresty/coordinator.lua:/etc/nginx/lua/coordinator.lua
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - cortex_network
      - enhasa_network

volumes:
  ollama_data:
  llama-cpp_data:

networks:
  cortex_network:
  enhasa_network:
    external: true
